name: quality-gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Preflight
        run: node scripts/preflight.mjs

      - name: Docs link check
        run: npm run check:docs-links

      - name: Workspace version drift check
        run: npm run check:versions

      - name: Build
        run: npm run build
